name: Aggiorna Recensioni Google

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch dati Google Places
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-place-data.mjs

      - name: Crea PR se dati cambiati
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/reviews.json src/data/opening-hours.json public/images/google-photos/
          if git diff --staged --quiet; then
            echo "Nessun aggiornamento"
            exit 0
          fi
          BRANCH="chore/update-reviews-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: aggiorna recensioni e orari Google"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: aggiorna recensioni Google $(date +%Y-%m-%d)" \
            --body "Aggiornamento automatico recensioni, orari e foto da Google Places API." \
            --base main || true
          gh pr merge "$BRANCH" --squash --auto || true
