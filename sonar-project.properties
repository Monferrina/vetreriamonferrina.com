sonar.projectKey=Monferrina_vetreriamonferrina.com
sonar.organization=monferrina

sonar.sources=src
sonar.tests=tests

sonar.exclusions=node_modules/**,dist/**,.astro/**,sanity/**,.vercel/**,public/**
# I file di dati/contenuti sono ripetitivi per natura (es. blocchi FAQ {q,a}): la
# copy-paste detection è pensata per la logica, non per i dati.
sonar.cpd.exclusions=src/data/**
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.spec.ts
sonar.coverage.exclusions=tests/**,**/*.config.*,src/env.d.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
